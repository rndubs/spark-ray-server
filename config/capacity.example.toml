# Capacity config for spark-orchestrator on the DGX Spark (GB10).
# Install at ~/.config/spark-orchestrator/capacity.toml (preferred) or
# /etc/spark-orchestrator/capacity.toml.
#
# schedulable_mem_gb is DERIVED: total - os_reserve - vllm_reserve.
# These are declared budgets (bookkeeping, not enforcement) — measure, don't
# guess. Restart spark-ray.service after changing reserves.

# measured_on = 2026-07-18
total_mem_gb = 121        # `free -g` total on the GB10
os_reserve_gb = 9         # OS + dgx-dashboard + slack for Ray itself
vllm_reserve_gb = 72      # operator vLLM at --gpu-memory-utilization 0.60
                          # (0.60 x 121; `free` confirms ~43 GB left). Set 0
                          # when the server is down.

# Per-job-class default budgets (GB). Overridden per job with --mem-gb.
# Measured on the GB10 (measured_on = 2026-07-18, acceptance gate 7):
# 500-step baseline train: peak RSS 2.9 GB, system-wide MemAvailable dip
# 7.1 GB (CUDA context + unified GPU allocs live outside RSS); eval
# (--n 32, 20-graph cap): peak RSS 1.6 GB, dip 3.1 GB. Budgets = dip +
# headroom.
[budgets]
default = 8
hexgen-train-27m = 10
hexgen-eval = 6

[paths]
runs_root = "/home/rwhit/spark-runs"

[gc]
failed_tree_ttl_days = 7

# Training dashboard (spark-dashboard.service). Read-only overlay on Ray:
# per-job provenance, curves, data-audit, GPU-hours. Bound to 127.0.0.1 —
# reach it over the tunnel `sparkctl dashboard` opens (localhost:8787).
[dashboard]
bind = "127.0.0.1"        # localhost ONLY — startup refuses anything else
port = 8787
ray_port = 8265           # Ray Jobs API the dashboard reads (loopback)
data_root = "/data/hexforge-data"   # DATA.md tree root, for tier tagging
disk_watch = "/data"      # disk-free shown in the host strip
stall_threshold_s = 600   # RUNNING with no output this long -> STALLED
history_depth = 50        # completed-jobs table depth (scans run-dir sidecars)
# Poll cadences (seconds); defaults match the spec.
poll_ray_s = 2
poll_host_s = 2
poll_metrics_s = 5
poll_fd_s = 30
poll_sidecar_s = 60
# hexgen adapter: metrics file + the loss columns plotted/summarised by
# default. A second training track sets its own here without touching core.
metrics_filename = "metrics.jsonl"
loss_keys = ["train_total", "holdout_total"]

# Gitignored assets symlinked from the main checkout into each pinned
# worktree (contract §5.4: config, not code). Paths that exist as tracked
# dirs in the tree get their missing entries linked one level down.
[[repos]]
path = "/home/rwhit/projection-meshing"
symlink_assets = [
  ".venv",
  ".venv-train",
  ".venv-serve",
  "data/brepgraph",
  "data/hexagent_traces",
  "data/hexgen",
  "data/hexgen_p2",
  "target/release",
]
