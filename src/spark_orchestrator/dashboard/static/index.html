<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spark Training Dashboard</title>
<link rel="stylesheet" href="/static/uplot.min.css">
<style>
  :root {
    --bg:#0e1116; --panel:#161b22; --panel2:#1c222b; --line:#2a313c;
    --fg:#e6edf3; --dim:#8b949e; --accent:#58a6ff;
    --green:#3fb950; --amber:#d29922; --red:#f85149; --grey:#6e7681;
    --mono:"SF Mono",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  code, .mono { font-family:var(--mono); }
  h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:.02em; }
  .muted { color:var(--dim); }

  /* host strip */
  #host { display:flex; flex-wrap:wrap; gap:0; align-items:stretch;
    background:var(--panel); border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:20; }
  #host .brand { display:flex; align-items:center; gap:10px; padding:10px 16px;
    border-right:1px solid var(--line); }
  #host .stat { padding:8px 16px; border-right:1px solid var(--line);
    display:flex; flex-direction:column; justify-content:center; min-width:92px; }
  #host .stat .k { font-size:10px; text-transform:uppercase; letter-spacing:.06em;
    color:var(--dim); }
  #host .stat .v { font-size:15px; font-variant-numeric:tabular-nums; margin-top:2px; }
  #host .stat .v small { font-size:11px; color:var(--dim); }
  .bar { height:4px; border-radius:2px; background:var(--line); margin-top:4px;
    overflow:hidden; }
  .bar > i { display:block; height:100%; background:var(--accent); }
  #host .grow { flex:1; }
  #dot { width:8px; height:8px; border-radius:50%; background:var(--grey);
    display:inline-block; }

  main { padding:16px; max-width:1600px; margin:0 auto; }
  section { margin-bottom:22px; }
  .sec-h { display:flex; align-items:baseline; gap:10px; margin:0 0 8px; }
  .sec-h h2 { font-size:12px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--dim); margin:0; font-weight:600; }

  table { width:100%; border-collapse:collapse; }
  th { text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.05em;
    color:var(--dim); font-weight:600; padding:6px 10px; border-bottom:1px solid var(--line); }
  td { padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top;
    font-variant-numeric:tabular-nums; }
  tr.job { cursor:pointer; }
  tr.job:hover { background:var(--panel2); }
  .desc { font-weight:500; }
  .sub { color:var(--dim); font-size:11px; }

  .badge { display:inline-block; padding:1px 7px; border-radius:10px; font-size:11px;
    font-weight:600; white-space:nowrap; }
  .b-running { background:rgba(88,166,255,.15); color:var(--accent); }
  .b-pending { background:rgba(139,148,158,.15); color:var(--dim); }
  .b-succeeded { background:rgba(63,185,80,.15); color:var(--green); }
  .b-failed { background:rgba(248,81,73,.15); color:var(--red); }
  .b-cancelled { background:rgba(210,153,34,.15); color:var(--amber); }
  .b-stalled { background:rgba(210,153,34,.15); color:var(--amber); }
  .b-unknown { background:rgba(110,118,129,.2); color:var(--grey); }
  .tag { display:inline-block; padding:0 6px; border-radius:4px; font-size:10px;
    font-weight:600; margin-left:4px; border:1px solid var(--line); }
  .tag.red { color:var(--red); border-color:var(--red); }
  .tag.amber { color:var(--amber); border-color:var(--amber); }
  .tag.grey { color:var(--dim); }
  .pill-frozen { color:var(--red); }
  .pill-corpora, .pill-banks { color:var(--green); }
  .pill-out { color:var(--dim); }

  .prog { min-width:120px; }
  .prog .bar { margin-top:3px; }
  .copy { cursor:pointer; color:var(--dim); border:1px solid var(--line);
    border-radius:5px; padding:1px 7px; font-size:11px; background:transparent; }
  .copy:hover { color:var(--fg); border-color:var(--accent); }

  /* detail drawer */
  #ov { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:40; }
  #drawer { position:fixed; top:0; right:0; bottom:0; width:min(880px,94vw);
    background:var(--panel); border-left:1px solid var(--line); z-index:41;
    transform:translateX(100%); transition:transform .18s ease; overflow-y:auto;
    display:none; }
  #drawer.open { transform:none; }
  #drawer .dh { position:sticky; top:0; background:var(--panel);
    border-bottom:1px solid var(--line); padding:14px 18px; display:flex;
    justify-content:space-between; align-items:flex-start; gap:12px; z-index:2; }
  #drawer .body { padding:18px; }
  #drawer h3 { font-size:11px; text-transform:uppercase; letter-spacing:.06em;
    color:var(--dim); margin:20px 0 8px; }
  .kv { display:grid; grid-template-columns:150px 1fr; gap:4px 12px; font-size:12px; }
  .kv .k { color:var(--dim); }
  pre { background:var(--bg); border:1px solid var(--line); border-radius:6px;
    padding:10px; overflow:auto; font-size:11px; max-height:340px; margin:0; }
  .close { cursor:pointer; font-size:20px; color:var(--dim); background:none;
    border:none; line-height:1; }
  .chart { width:100%; height:260px; }
  .toolbar { display:flex; gap:12px; align-items:center; margin-bottom:6px; }
  label.ck { color:var(--dim); font-size:12px; cursor:pointer; user-select:none; }
  #err { color:var(--amber); font-size:11px; padding:4px 16px; }
</style>
</head>
<body>
  <div id="host"></div>
  <div id="err"></div>
  <main>
    <section id="jobs-sec">
      <div class="sec-h"><h2>Jobs</h2><span class="muted" id="jobs-meta"></span></div>
      <table id="jobs"><thead></thead><tbody></tbody></table>
    </section>
    <section id="hist-sec">
      <div class="sec-h"><h2>Completed jobs</h2><span class="muted">click a row for detail · copy the LEDGER line</span></div>
      <table id="hist"><thead></thead><tbody></tbody></table>
    </section>
  </main>

  <div id="ov"></div>
  <div id="drawer"><div class="dh"></div><div class="body"></div></div>

  <script src="/static/uplot.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
